---
apiVersion: v1
kind: Namespace
metadata:
  name: telemetry
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: glitchtip-external-secret
  namespace: telemetry
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: glitchtip
    creationPolicy: Owner
    template:
      data:
        SECRET_KEY: "{{ .SECRET_KEY }}"
        DATABASE_URL: "postgres://postgres:glitchtippassword@glitchtip-database-postgresql.telemetry.svc.cluster.local:5432/glitchtip"
        REDIS_URL: "redis://:glitchtipredispassword@glitchtip-redis-master.telemetry.svc.cluster.local:6379/0"
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: secret/glitchtip/production
        property: SECRET_KEY
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: glitchtip
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: 'https://gitlab.com/api/v4/projects/16325141/packages/helm/stable'
    targetRevision: '*'
    chart: glitchtip
    helm:
      values: |
        glitchtip:
          existingSecret: "glitchtip"
          domain: "https://glitchtip.autoscaleops.com"
          database:
            existingSecret: "glitchtip"
        
        web:
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              kubernetes.io/ingress.class: traefik
              traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
              cert-manager.io/cluster-issuer: letsencrypt-prod
            hosts:
              - host: glitchtip.autoscaleops.com
                paths:
                  - path: /
                    pathType: Prefix
            tls:
              - secretName: glitchtip-tls
                hosts:
                  - glitchtip.autoscaleops.com
        
        postgresql:
          enabled: false
        
        redis:
          enabled: true
          architecture: standalone
          auth:
            password: "glitchtipredispassword"
          master:
            persistence:
              enabled: true
              size: 2Gi
            resources:
              requests:
                memory: 128Mi
                cpu: 50m
              limits:
                memory: 256Mi
                cpu: 100m
  destination:
    server: https://kubernetes.default.svc
    namespace: telemetry
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: glitchtip-database
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: 18.5.15
    chart: postgresql
    helm:
      values: |
        auth:
          postgresPassword: "glitchtippassword"
          database: "glitchtip"
        primary:
          persistence:
            size: 8Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: telemetry
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
